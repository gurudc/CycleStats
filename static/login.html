<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleStats — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1e2d3d;
            border-radius: 16px;
            padding: 48px 40px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid #2a3d4f;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 700; color: #4fc3f7; letter-spacing: 1px; }
        .logo p { color: #8a9aa8; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #b0c4d4; font-size: 14px; font-weight: 500; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px 16px;
            border: 1px solid #2a3d4f; border-radius: 8px;
            background: #0f1923; color: #e0e0e0;
            font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #4fc3f7; }
        .btn-login {
            width: 100%; padding: 12px; background: #4fc3f7; color: #0f1923;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        .btn-login:hover { background: #39b0e4; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #ef5350; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
        .error.visible { display: block; }
        .version { text-align: center; margin-top: 24px; color: #5a6a78; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🚴 CycleStats</h1>
            <p>Performance Dashboard</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div class="error" id="errorMsg">Invalid password. Please try again.</div>
        </form>
        <div class="version">CycleStats v1.0.0</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('errorMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            error.classList.remove('visible');
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    error.textContent = data.detail || 'Invalid password. Please try again.';
                    error.classList.add('visible');
                }
            } catch (err) {
                error.textContent = 'Connection error. Please try again.';
                error.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
